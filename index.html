<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Torneios - FC Académicos</title>
    <style>
        :root {
            --bg-principal: #ffffff;
            --bg-card: #f9f9f9;      
            --texto-claro: #000000;  
            --texto-mutado: #555555; 
            --accent: #000000;       
            --borda: #cccccc;        
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--texto-claro);
        }

        header img {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--texto-claro);
        }

        header p {
            color: var(--texto-mutado);
            font-size: 1rem;
            margin-top: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* Títulos dos Meses */
        .secao-mes {
            margin-bottom: 50px;
        }

        .titulo-mes {
            font-size: 1.5rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--texto-claro);
            padding-bottom: 5px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .grid-torneios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card-torneio {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--borda);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-torneio:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            border-color: var(--texto-claro);
        }

        .poster-wrapper {
            width: 100%;
            padding-top: 135%; 
            position: relative;
            background-color: #f0f0f0;
            border-bottom: 1px solid var(--borda);
        }

        .poster-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-torneio {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .info-torneio h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            line-height: 1.4;
            color: var(--texto-claro);
        }

        .detalhe {
            font-size: 0.9rem;
            color: var(--texto-mutado);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Destaque para o Comentário/Observação */
        .comentario-torneio {
            margin-top: 10px;
            margin-bottom: 15px;
            padding: 8px;
            background-color: #f0f0f0;
            border-left: 3px solid var(--texto-claro);
            font-size: 0.85rem;
            color: #333333;
            font-style: italic;
            border-radius: 2px;
        }

        .btn-download {
            margin-top: auto;
            background-color: transparent;
            color: var(--texto-claro);
            border: 2px solid var(--texto-claro);
            padding: 10px;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }

        .btn-download:hover {
            background-color: var(--texto-claro);
            color: #ffffff;
        }

        .controles-admin {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }

        .btn-delete {
            background-color: rgba(218, 0, 0, 0.9);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: none;
        }

        .btn-edit {
            background-color: rgba(0, 100, 218, 0.9);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: none;
        }

        /* Modal de Login */
        .modal-login {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            border: 2px solid var(--texto-claro);
            position: relative;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* Seção Administrativa */
        .admin-section {
            background-color: #f1f1f1;
            border-top: 2px solid var(--texto-claro);
            padding: 40px 20px;
            display: none;
        }

        .admin-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .admin-container h2 {
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            color: var(--texto-claro);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--texto-mutated);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: #ffffff;
            border: 1px solid var(--borda);
            color: black;
            border-radius: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--texto-claro);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        footer {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--texto-mutated);
            border-top: 1px solid var(--borda);
        }

        footer button {
            background: none;
            border: none;
            color: var(--texto-claro);
            cursor: pointer;
            text-decoration: underline;
            margin-left: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="FC Académicos Logo">
        <h1>Calendário de Torneios</h1>
        <p>Época 2026/2027</p>
    </header>

    <div class="container" id="containerMeses">
        <p style="text-align: center; color: var(--texto-mutado);" id="txtCarregando">A carregar campeonatos...</p>
    </div>

    <!-- Modal de Login -->
    <div class="modal-login" id="modalLogin">
        <div class="modal-content">
            <span class="close-modal" onclick="window.fecharModal()">×</span>
            <h3>Acesso Direção</h3>
            <form id="formLogin">
                <div class="form-group">
                    <label>Utilizador</label>
                    <input type="text" id="loginEmail" placeholder="Carlos Martins" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" placeholder="******" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
        </div>
    </div>

    <footer>
        © 2026 FC Académicos. Todos os direitos reservados.
        <button id="btnGatilhoAdmin" onclick="window.abrirOuSairAdmin()">Acesso Direção</button>
    </footer>

    <!-- Área de Manutenção -->
    <section class="admin-section" id="secaoAdmin">
        <div class="admin-container">
            <h2 id="tituloForm">Nova Manutenção de Torneio</h2>
            <form id="formTorneio">
                <input type="hidden" id="editId" value="">

                <div class="form-group">
                    <label>Nome do Torneio / Campeonato</label>
                    <input type="text" id="nomeTorneio" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Data de Início</label>
                        <input type="date" id="dataInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Data de Fim</label>
                        <input type="date" id="dataFim" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Local</label>
                    <input type="text" id="localTorneio" required>
                </div>
                <div class="form-group">
                    <label>Link Direto do Cartaz/Imagem (Google Drive suportado)</label>
                    <input type="url" id="imagemTorneio" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                <div class="form-group">
                    <label>Link Direto do Informativo (PDF opcional)</label>
                    <input type="url" id="pdfTorneio" placeholder="https://exemplo.com/documento.pdf">
                </div>
                
                <!-- Novo campo opcional de Observações -->
                <div class="form-group">
                    <label>Observações / Comentários (Opcional - ex: "Brevemente mais informações")</label>
                    <input type="text" id="comentarioTorneioForm" placeholder="Aviso a exibir no cartaz">
                </div>

                <button type="submit" class="btn-submit" id="btnSalvarForm">Publicar no Calendário</button>
            </form>
        </div>
    </section>

    <!-- SCRIPTS DO FIREBASE E LOGIN DIRETO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwtgI2CPCRCqEJiongyrU7AA3lVLENMUw",
            authDomain: "calendariotorneios-4dd2c.firebaseapp.com",
            projectId: "calendariotorneios-4dd2c",
            storageBucket: "calendariotorneios-4dd2c.firebasestorage.app",
            messagingSenderId: "440861690468",
            appId: "1:440861690468:web:f094625735e66e93c62d71",
            measurementId: "G-GPLW8354GC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let usuarioLogado = false;

        const USUARIO_CORRETO = "Carlos Martins";
        const SENHA_CORRETA = "academicos2027";

        // Imagem padrão neutra de voleibol caso não haja cartaz oficial ainda
        const BANNER_PADRAO = "https://images.unsplash.com/photo-1547483238-f400e65ccd56?q=80&w=600&auto=format&fit=crop";

        let dadosLocais = [
            { id: "mock_1", nome: "Torneio de Abertura FC Académicos", dataInicio: "2026-09-15", dataFim: "2026-09-16", local: "Pavilhão Municipal", urlBanner: BANNER_PADRAO, urlPdf: "", comentario: "" },
            { id: "mock_2", nome: "Campeonato Regional Master", dataInicio: "2026-10-22", dataFim: "2026-10-25", local: "Barcelos", urlBanner: "https://images.unsplash.com/photo-1592656094267-764a45068526?q=80&w=600&auto=format&fit=crop", urlPdf: "", comentario: "" },
            { id: "mock_3", nome: "Grande Torneio de Encerramento", dataInicio: "2026-12-01", dataFim: "2026-12-01", local: "A definir", urlBanner: BANNER_PADRAO, urlPdf: "", comentario: "Data prevista. Aguardamos a publicação do cartaz oficial." }
        ];

        const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        function converterLinkDrive(url) {
            if (!url) return BANNER_PADRAO;
            if (url.includes("drive.google.com")) {
                let parts = url.split(/\/file\/d\/(.+?)\//);
                if (parts && parts[1]) {
                    return `https://lh3.googleusercontent.com/u/0/d/${parts[1]}`;
                }
                let idParam = url.split("id=");
                if (idParam && idParam[1]) {
                    return `https://lh3.googleusercontent.com/u/0/d/${idParam[1].split("&")[0]}`;
                }
            }
            return url;
        }

        function exibirListaPorMeses(lista) {
            const container = document.getElementById('containerMeses');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--texto-mutado);">Nenhum torneio agendado para esta época.</p>';
                return;
            }

            let grupos = {};
            lista.forEach(t => {
                let dataObj = new Date(t.dataInicio);
                let ano = dataObj.getFullYear();
                let mesIdx = dataObj.getMonth();
                let chave = `${ano}-${String(mesIdx).padStart(2, '0')}`;

                if(!grupos[chave]) {
                    grupos[chave] = { nomeMes: `${nomesMeses[mesIdx]} ${ano}`, itens: [] };
                }
                grupos[chave].itens.push(t);
            });

            let chavesOrdenadas = Object.keys(grupos).sort();

            chavesOrdenadas.forEach(chave => {
                const grupo = grupos[chave];

                const secao = document.createElement('div');
                secao.className = 'secao-mes';
                secao.innerHTML = `<h2 class="titulo-mes">${grupo.nomeMes}</h2>`;

                const grid = document.createElement('div');
                grid.className = 'grid-torneios';

                grupo.itens.forEach(t => {
                    const dInicio = new Date(t.dataInicio).toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' });
                    const dFim = new Date(t.dataFim).toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    
                    const exibicaoData = dInicio === new Date(t.dataFim).toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' }) 
                        ? `📅 ${dFim}` 
                        : `📅 Dias ${new Date(t.dataInicio).getDate()} a ${dFim}`;

                    // Se houver comentário, adiciona a caixa estruturada no HTML
                    const htmlComentario = t.comentario ? `<div class="comentario-torneio">ℹ️ ${t.comentario}</div>` : '';

                    const card = document.createElement('div');
                    card.className = 'card-torneio';
                    card.innerHTML = `
                        <div class="controles-admin">
                            <button class="btn-edit" style="display: ${usuarioLogado ? 'block' : 'none'}" data-id="${t.id}">Editar</button>
                            <button class="btn-delete" style="display: ${usuarioLogado ? 'block' : 'none'}" data-id="${t.id}">Apagar</button>
                        </div>
                        <div class="poster-wrapper">
                            <img src="${t.urlBanner || BANNER_PADRAO}" alt="Cartaz" onerror="this.src='${BANNER_PADRAO}'">
                        </div>
                        <div class="info-torneio">
                            <h3>${t.nome}</h3>
                            <div class="detalhe">${exibicaoData}</div>
                            <div class="detalhe">📍 ${t.local}</div>
                            ${htmlComentario}
                            ${t.urlPdf ? `<a href="${t.urlPdf}" target="_blank" class="btn-download">Informativo (PDF)</a>` : '<button class="btn-download" disabled style="opacity:0.3; border-color:#aaa; color:#aaa;">Sem PDF</button>'}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                secao.appendChild(grid);
                container.appendChild(secao);
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = async (e) => {
                    if(confirm("Tem certeza que deseja apagar este torneio?")) {
                        const idDoc = e.target.getAttribute('data-id');
                        dadosLocais = dadosLocais.filter(item => item.id !== idDoc);
                        try {
                            await deleteDoc(doc(db, "torneios", idDoc));
                        } catch(err) { console.log("Removido no ecrã."); }
                        exibirListaPorMeses(dadosLocais);
                    }
                };
            });

            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.onclick = (e) => {
                    const idDoc = e.target.getAttribute('data-id');
                    const item = dadosLocais.find(t => t.id === idDoc);
                    
                    if(item) {
                        document.getElementById('editId').value = item.id;
                        document.getElementById('nomeTorneio').value = item.nome;
                        document.getElementById('dataInicio').value = item.dataInicio;
                        document.getElementById('dataFim').value = item.dataFim;
                        document.getElementById('localTorneio').value = item.local;
                        document.getElementById('imagemTorneio').value = item.urlBanner === BANNER_PADRAO ? "" : item.urlBanner;
                        document.getElementById('pdfTorneio').value = item.urlPdf;
                        document.getElementById('comentarioTorneioForm').value = item.comentario || "";

                        document.getElementById('tituloForm').innerText = "Editar Torneio Selecionado";
                        document.getElementById('btnSalvarForm').innerText = "Atualizar Torneio";
                        
                        document.getElementById('secaoAdmin').scrollIntoView({ behavior: 'smooth' });
                    }
                };
            });
        }

        async function renderizarTorneios() {
            try {
                const querySnapshot = await getDocs(collection(db, "torneios"));
                let listaFirebase = [];
                querySnapshot.forEach((docSnap) => {
                    let d = docSnap.data();
                    listaFirebase.push({ 
                        id: docSnap.id, 
                        nome: d.nome,
                        dataInicio: d.dataInicio || d.data,
                        dataFim: d.dataFim || d.data,
                        local: d.local,
                        urlBanner: d.urlBanner,
                        urlPdf: d.urlPdf,
                        comentario: d.comentario || ""
                    });
                });
                if(listaFirebase.length > 0) { dadosLocais = listaFirebase; }
                dadosLocais.sort((a, b) => new Date(a.dataInicio) - new Date(b.dataInicio));
                exibirListaPorMeses(dadosLocais);
            } catch (error) {
                dadosLocais.sort((a, b) => new Date(a.dataInicio) - new Date(b.dataInicio));
                exibirListaPorMeses(dadosLocais);
            }
        }

        function atualizarPainelAdmin() {
            const secaoAdmin = document.getElementById('secaoAdmin');
            const btnGatilho = document.getElementById('btnGatilhoAdmin');
            if (usuarioLogado) {
                secaoAdmin.style.display = 'block';
                btnGatilho.innerText = "Sair (Logout)";
            } else {
                secaoAdmin.style.display = 'none';
                btnGatilho.innerText = "Acesso Direção";
            }
            exibirListaPorMeses(dadosLocais);
        }

        window.abrirOuSairAdmin = function() {
            if (usuarioLogado) {
                usuarioLogado = false;
                atualizarPainelAdmin();
            } else {
                document.getElementById('modalLogin').style.display = 'flex';
            }
        }

        window.fecharModal = function() {
            document.getElementById('modalLogin').style.display = 'none';
        }

        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const usuarioDigitado = document.getElementById('loginEmail').value.trim();
            const senhaDigitada = document.getElementById('loginSenha').value.trim();

            if (usuarioDigitado === USUARIO_CORRETO && senhaDigitada === SENHA_CORRETA) {
                usuarioLogado = true;
                window.fecharModal();
                document.getElementById('formLogin').reset();
                atualizarPainelAdmin();
            } else {
                alert("Acesso negado: Utilizador ou senha incorretos.");
            }
        });

        renderizarTorneios();

        document.getElementById('formTorneio').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = e.target.querySelector('.btn-submit');
            btnSubmit.innerText = "A guardar... Aguarde.";
            btnSubmit.disabled = true;

            const idEdicao = document.getElementById('editId').value;
            const nome = document.getElementById('nomeTorneio').value;
            const dataInicio = document.getElementById('dataInicio').value;
            const dataFim = document.getElementById('dataFim').value;
            const local = document.getElementById('localTorneio').value;
            const urlBanner = converterLinkDrive(document.getElementById('imagemTorneio').value.trim());
            const urlPdf = document.getElementById('pdfTorneio').value.trim();
            const comentario = document.getElementById('comentarioTorneioForm').value.trim();

            const dadosObjeto = { nome, dataInicio, dataFim, local, urlBanner, urlPdf, comentario };

            if (idEdicao) {
                const idx = dadosLocais.findIndex(item => item.id === idEdicao);
                if(idx !== -1) { dadosLocais[idx] = { id: idEdicao, ...dadosObjeto }; }
                try {
                    await updateDoc(doc(db, "torneios", idEdicao), dadosObjeto);
                } catch(err) { console.log("Atualizado localmente."); }
                alert("Torneio atualizado com sucesso!");
            } else {
                let novoId = "local_" + Date.now();
                try {
                    const docRef = await addDoc(collection(db, "torneios"), dadosObjeto);
                    novoId = docRef.id;
                } catch (error) { console.log("Criado localmente."); }
                dadosLocais.push({ id: novoId, ...dadosObjeto });
                alert("Torneio adicionado com sucesso!");
            }

            document.getElementById('formTorneio').reset();
            document.getElementById('editId').value = "";
            document.getElementById('tituloForm').innerText = "Nova Manutenção de Torneio";
            document.getElementById('btnSalvarForm').innerText = "Publicar no Calendário";

            dadosLocais.sort((a, b) => new Date(a.dataInicio) - new Date(b.dataInicio));
            exibirListaPorMeses(dadosLocais);
            
            btnSubmit.innerText = "Publicar no Calendário";
            btnSubmit.disabled = false;
        });
    </script>
</body>
</html>
