<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Torneios - FC Académicos</title>
    <style>
        :root {
            --bg-principal: #ffffff;
            --bg-card: #f9f9f9;      
            --texto-claro: #000000;  
            --texto-mutado: #555555; 
            --accent: #000000;       
            --borda: #cccccc;        
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--texto-claro);
        }

        header img {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--texto-claro);
        }

        header p {
            color: var(--texto-mutado);
            font-size: 1rem;
            margin-top: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        .grid-torneios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card-torneio {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--borda);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-torneio:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            border-color: var(--texto-claro);
        }

        .poster-wrapper {
            width: 100%;
            padding-top: 135%; 
            position: relative;
            background-color: #f0f0f0;
            border-bottom: 1px solid var(--borda);
        }

        .poster-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-torneio {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .info-torneio h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            line-height: 1.4;
            color: var(--texto-claro);
        }

        .detalhe {
            font-size: 0.9rem;
            color: var(--texto-mutado);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-download {
            margin-top: auto;
            background-color: transparent;
            color: var(--texto-claro);
            border: 2px solid var(--texto-claro);
            padding: 10px;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }

        .btn-download:hover {
            background-color: var(--texto-claro);
            color: #ffffff;
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(218, 0, 0, 0.9);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: none;
            z-index: 10;
        }

        /* Modal de Login */
        .modal-login {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            border: 2px solid var(--texto-claro);
            position: relative;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* Seção Administrativa */
        .admin-section {
            background-color: #f1f1f1;
            border-top: 2px solid var(--texto-claro);
            padding: 40px 20px;
            display: none;
        }

        .admin-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .admin-container h2 {
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            color: var(--texto-claro);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--texto-mutado);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: #ffffff;
            border: 1px solid var(--borda);
            color: black;
            border-radius: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--texto-claro);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        footer {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--texto-mutado);
            border-top: 1px solid var(--borda);
        }

        footer button {
            background: none;
            border: none;
            color: var(--texto-claro);
            cursor: pointer;
            text-decoration: underline;
            margin-left: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="FC Académicos Logo">
        <h1>Calendário de Torneios</h1>
        <p>Época 2026/2027</p>
    </header>

    <div class="container">
        <div class="grid-torneios" id="gridTorneios">
            <p style="text-align: center; grid-column: 1/-1; color: var(--texto-mutado);">A carregar campeonatos...</p>
        </div>
    </div>

    <div class="modal-login" id="modalLogin">
        <div class="modal-content">
            <span class="close-modal" onclick="window.fecharModal()">&times;</span>
            <h3>Acesso Direção</h3>
            <form id="formLogin">
                <div class="form-group">
                    <label>E-mail / Utilizador</label>
                    <input type="text" id="loginEmail" placeholder="carlosmartins@academicos.pt" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" placeholder="******" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 FC Académicos. Todos os direitos reservados.
        <button id="btnGatilhoAdmin" onclick="window.abrirOuSairAdmin()">Acesso Direção</button>
    </footer>

    <section class="admin-section" id="secaoAdmin">
        <div class="admin-container">
            <h2>Nova Manutenção de Torneio</h2>
            <form id="formTorneio">
                <div class="form-group">
                    <label>Nome do Torneio / Campeonato</label>
                    <input type="text" id="nomeTorneio" required>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="dataTorneio" required>
                </div>
                <div class="form-group">
                    <label>Local</label>
                    <input type="text" id="localTorneio" required>
                </div>
                <div class="form-group">
                    <label>Cartaz/Banner (Imagem)</label>
                    <input type="file" id="imagemTorneio" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Informativo/Regulamento (PDF opcional)</label>
                    <input type="file" id="pdfTorneio" accept=".pdf">
                </div>
                <button type="submit" class="btn-submit">Publicar no Calendário</button>
            </form>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwtgI2CPCRCqEJiongyrU7AA3lVLENMUw",
            authDomain: "calendariotorneios-4dd2c.firebaseapp.com",
            projectId: "calendariotorneios-4dd2c",
            storageBucket: "calendariotorneios-4dd2c.firebasestorage.app",
            messagingSenderId: "440861690468",
            appId: "1:440861690468:web:f094625735e66e93c62d71",
            measurementId: "G-GPLW8354GC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let usuarioLogado = false;

        // Hashes SHA-256 diretos no código para segurança local sem arquivo externo
        const USER_HASH = "8ba788939bd6575de2db7e5e347fb7fa75979c78759fb1c5bf0f49646b53cc97"; // carlosmartins@academicos.pt
        const PASS_HASH = "85b244018260b00dfbf6c7a33cf50676fae85295f7ba1420716616e256f3458c"; // academicos2027

        async function gerarHash(string) {
            const msgBuffer = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function renderizarTorneios() {
            const grid = document.getElementById('gridTorneios');
            grid.innerHTML = '';

            try {
                const q = query(collection(db, "torneios"), orderBy("data", "asc"));
                const querySnapshot = await getDocs(q);
                
                if(querySnapshot.empty) {
                    grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: var(--texto-mutado);">Nenhum torneio agendado para esta época.</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    const dataFormatada = new Date(t.data).toLocaleDateString('pt-PT');

                    const card = document.createElement('div');
                    card.className = 'card-torneio';
                    card.innerHTML = `
                        <button class="btn-delete" style="display: ${usuarioLogado ? 'block' : 'none'}" data-id="${id}">Apagar</button>
                        <div class="poster-wrapper">
                            <img src="${t.urlBanner}" alt="Cartaz do Torneio">
                        </div>
                        <div class="info-torneio">
                            <h3>${t.nome}</h3>
                            <div class="detalhe">📅 ${dataFormatada}</div>
                            <div class="detalhe">📍 ${t.local}</div>
                            ${t.urlPdf ? `<a href="${t.urlPdf}" target="_blank" class="btn-download">Informativo (PDF)</a>` : '<button class="btn-download" disabled style="opacity:0.3; border-color:#aaa; color:#aaa;">Sem PDF</button>'}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("Tem certeza que deseja apagar este torneio?")) {
                            const idDoc = e.target.getAttribute('data-id');
                            await deleteDoc(doc(db, "torneios", idDoc));
                            renderizarTorneios();
                        }
                    });
                });

            } catch (error) {
                console.error("Erro ao ler dados: ", error);
                grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: red;">Erro ao carregar o calendário.</p>';
            }
        }

        function atualizarPainelAdmin() {
            const secaoAdmin = document.getElementById('secaoAdmin');
            const btnGatilho = document.getElementById('btnGatilhoAdmin');
            
            if (usuarioLogado) {
                secaoAdmin.style.display = 'block';
                btnGatilho.innerText = "Sair (Logout)";
            } else {
                secaoAdmin.style.display = 'none';
                btnGatilho.innerText = "Acesso Direção";
            }
            renderizarTorneios();
        }

        window.abrirOuSairAdmin = function() {
            if (usuarioLogado) {
                usuarioLogado = false;
                atualizarPainelAdmin();
            } else {
                document.getElementById('modalLogin').style.display = 'flex';
            }
        }

        window.fecharModal = function() {
            document.getElementById('modalLogin').style.display = 'none';
        }

        // Validação interna direta sem depender de arquivo externo
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuarioDigitado = document.getElementById('loginEmail').value;
            const senhaDigitada = document.getElementById('loginSenha').value;

            const hashUser = await gerarHash(usuarioDigitado.trim().toLowerCase());
            const hashPass = await gerarHash(senhaDigitada);

            if (hashUser === USER_HASH && hashPass === PASS_HASH) {
                usuarioLogado = true;
                window.fecharModal();
                document.getElementById('formLogin').reset();
                atualizarPainelAdmin();
            } else {
                alert("Acesso negado: Utilizador ou senha incorretos.");
            }
        });

        renderizarTorneios();

        document.getElementById('formTorneio').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = e.target.querySelector('.btn-submit');
            btnSubmit.innerText = "A publicar... Aguarde.";
            btnSubmit.disabled = true;

            const nome = document.getElementById('nomeTorneio').value;
            const data = document.getElementById('dataTorneio').value;
            const local = document.getElementById('localTorneio').value;
            const fileImagem = document.getElementById('imagemTorneio').files[0];
            const filePdf = document.getElementById('pdfTorneio').files[0];

            try {
                const storageRefImg = ref(storage, `banners/${Date.now()}_${fileImagem.name}`);
                const snapshotImg = await uploadBytes(storageRefImg, fileImagem);
                const urlBanner = await getDownloadURL(snapshotImg.ref);

                let urlPdf = "";
                if (filePdf) {
                    const storageRefPdf = ref(storage, `documentos/${Date.now()}_${filePdf.name}`);
                    const snapshotPdf = await uploadBytes(storageRefPdf, filePdf);
                    urlPdf = await getDownloadURL(snapshotPdf.ref);
                }

                await addDoc(collection(db, "torneios"), {
                    nome,
                    data,
                    local,
                    urlBanner,
                    urlPdf
                });

                alert("Torneio publicado com sucesso!");
                document.getElementById('formTorneio').reset();
                renderizarTorneios();

            } catch (error) {
                console.error("Erro ao publicar: ", error);
                alert("Erro ao salvar. Verifique se as regras do Firestore/Storage estão públicas.");
            } finally {
                btnSubmit.innerText = "Publicar no Calendário";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
